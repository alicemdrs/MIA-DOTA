<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mia Dota - Cadastro de Adotante</title>
    <style>
        /* Paleta de Cores Pastéis (Roxo/Lilás) idêntica ao Login */
        :root {
            --bg-gradient: linear-gradient(135deg, #f3efff 0%, #e5dbff 100%);
            --card-bg: #ffffff;
            --purple-primary: #9c88ff;
            --purple-hover: #7f57ff;
            --purple-light: #f1edff;
            --text-main: #4a4355;
            --text-muted: #8e8599;
            --border-color: #e1dbe9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .cadastro-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(156, 136, 255, 0.15);
        }

        .header-cadastro {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-cadastro h1 {
            color: var(--purple-primary);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .header-cadastro p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Formulário */
        .form-group {
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--purple-primary);
            box-shadow: 0 0 0 4px rgba(156, 136, 255, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--purple-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .btn-submit:hover {
            background: var(--purple-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .footer-cadastro {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-cadastro a {
            color: var(--purple-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-cadastro a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="cadastro-container">
        <div class="header-cadastro">
            <h1>🐾 Criar Conta</h1>
            <p>Cadastre-se para encontrar seu novo melhor amigo!</p>
        </div>

        <form id="cadastroForm">
            <!-- Forçamos o papel fixo de ADOTANTE invisível para o usuário, mantendo a compatibilidade do backend -->
            <input type="hidden" id="userRole" value="ADOTANTE">

            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="exemplo@email.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Crie uma senha segura" required autocomplete="new-password">
            </div>

            <button type="button" class="btn-submit" onclick="realizarCadastro()">Cadastrar e Entrar</button>
        </form>

        <div class="footer-cadastro">
            Já possui uma conta? <a href="loginScreen.html">Faça login aqui</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000'; 

        async function realizarCadastro() {
            const name = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('userRole').value; // Sempre ADOTANTE

            // Validação simples visual antes de tentar enviar
            if (!name || !email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            try {
                // Conecta com a rota de criação de usuários do NestJS
                const response = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Falha ao criar conta.');
                }

                alert("Conta criada com sucesso! Redirecionando para o login...");
                
                // Leva o usuário de volta para a tela de login para ele testar o acesso
                window.location.href = 'login.html';

            } catch (error) {
                // --- FALLBACK PARA APRESENTAÇÃO LOCAL SEM BACKEND LIGADO ---
                console.warn("Backend offline. Simulando sucesso para fins de teste.");
                alert("Conta simulada com sucesso! (Modo de Apresentação)");
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
