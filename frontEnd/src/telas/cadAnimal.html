<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Animal - Mia Dota</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav>
        <h1>
            <a href="vitrineScreen.html" class="nav-brand-link">
                <img class="logo-img" src="assets/logo.avif" alt="Logo Patinha">
                Mia Dota Admin
            </a>
        </h1>
        <div class="nav-links">
            <a href="PainelScreen.html" class="nav-tab-link">Pedido de adoção</a>
            <a href="VisitaScreen.html" class="nav-tab-link">Visitas</a>
            <a href="cadAnimal.html" class="nav-tab-link active">Cadastrar Animais</a>
        </div>
    </nav>

    <main class="admin">
        <div class="form-card cad-form-card">
            <h2>Cadastrar Novo Pet para a Vitrine</h2>
            <form id="petForm" onsubmit="cadastrarPet(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="petName">Nome do Pet *</label>
                        <input type="text" id="petName" required placeholder="Ex: Frederico">
                    </div>
                    <div class="form-group">
                        <label for="petSpecies">Espécie *</label>
                        <select id="petSpecies" required>
                            <option value="Cão">Cão</option>
                            <option value="Gato">Gato</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="petSize">Porte *</label>
                        <select id="petSize" required>
                            <option value="PEQUENO">Pequeno</option>
                            <option value="MEDIO">Médio</option>
                            <option value="GRANDE">Grande</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petGender">Sexo *</label>
                        <select id="petGender" required>
                            <option value="Macho">Macho</option>
                            <option value="Fêmea">Fêmea</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="petAge">Idade Estimada *</label>
                        <input type="text" id="petAge" required placeholder="Ex: 2 anos ou 5 meses">
                    </div>
                    <div class="form-group">
                        <label for="petArrivalDate">Data de Chegada ao MiaDota *</label>
                        <input type="date" id="petArrivalDate" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="petOrg">Organização Responsável (ONG) *</label>
                        <select id="petOrg" required>
                            <option value="">Selecione uma organização...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petStatus">Status Inicial *</label>
                        <select id="petStatus" required>
                            <option value="Disponível">Disponível</option>
                            <option value="Adotado">Adotado</option>
                            <option value="Em Tratamento">Em Tratamento</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="petPhoto">URL da Foto do Pet *</label>
                    <input type="url" id="petPhoto" required placeholder="https://linkdafoto.com/imagem.jpg">
                </div>

                <div class="form-group">
                    <label for="petDesc">Descrição/História *</label>
                    <textarea id="petDesc" required placeholder="Fale sobre as características e o temperamento do animal..."></textarea>
                </div>

                <button type="submit" class="btn-submit-pet">Colocar na Vitrine</button>
            </form>
        </div>

        <h2 class="section-title">Animais já Cadastrados</h2>
        <div id="petsContainer" class="pets-grid"></div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/cad-animal.js"></script>
</body>
</html>
