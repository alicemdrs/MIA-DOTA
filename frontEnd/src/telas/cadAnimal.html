<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Animal - Mia Dota</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f3efff 0%, #e5dbff 100%);
            --card-bg: #ffffff;
            --purple-primary: #9c88ff;
            --purple-hover: #7f57ff;
            --purple-light: #f1edff;
            --text-main: #4a4355;
            --text-muted: #8e8599;
            --border-color: #e1dbe9;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fcfbfe;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(156, 136, 255, 0.08);
        }

        nav h1 {
            color: var(--purple-primary);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav h1 a {
            text-decoration: none; 
            color: inherit; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            cursor: pointer;
        }

        .logo-img {
            width: 102px;
            height: 92px;
            border-radius: 90px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-tab-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-tab-link.active {
            color: var(--purple-primary);
            background: var(--purple-light);
        }

        .nav-tab-link:hover:not(.active) {
            color: var(--purple-primary);
            background: var(--purple-light);
        }

        main {
            max-width: 1000px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1.5rem;
            flex-grow: 1;
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            max-width: 650px;
            margin: 0 auto 3rem auto;
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            text-align: center;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            text-align: left;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
            background-color: #fff;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--purple-primary);
        }

        .form-group textarea { 
            height: 110px; 
            resize: none; 
        }

        .btn-submit-pet {
            width: 100%;
            padding: 0.85rem;
            background: var(--purple-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit-pet:hover { 
            background: var(--purple-hover); 
        }

        /* Lista de Pets Cadastrados */
        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .pet-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.01);
            display: flex;
            flex-direction: column;
        }

        .pet-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: var(--purple-light);
        }

        .pet-card-body {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .pet-card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .pet-card-info {
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .pet-card-info strong {
            color: var(--text-muted);
        }

        .pet-card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            padding-top: 1rem;
        }

        .btn-pet-action {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-pet-action:hover {
            opacity: 0.9;
        }

        .btn-pet-delete {
            background-color: #fff0f0;
            color: var(--danger);
            border: 1px solid #ffe0e0;
        }

        .btn-pet-delete:hover {
            background-color: #ffe3e3;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <nav>
        <h1>
            <a href="vitrineScreen.html">
                <img class="logo-img" src="../1ef274206497fe7243acd8c0c03005da.jpeg" alt="Logo Patinha">
                Mia Dota Admin
            </a>
        </h1>
        <div class="nav-links">
            <a href="PainelScreen.html" class="nav-tab-link">Pedido de adoção</a>
            <a href="VisitaScreen.html" class="nav-tab-link">Visitas</a>
            <a href="cadAnimal.html" class="nav-tab-link active">Cadastrar Animais</a>
        </div>
    </nav>

    <main>
        <!-- Formulario de Cadastro -->
        <div class="form-card">
            <h2>Cadastrar Novo Pet para a Vitrine</h2>
            <form id="petForm" onsubmit="cadastrarPet(event)">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="petName">Nome do Pet *</label>
                        <input type="text" id="petName" required placeholder="Ex: Frederico">
                    </div>
                    <div class="form-group">
                        <label for="petSpecies">Espécie *</label>
                        <select id="petSpecies" required>
                            <option value="Cão">Cão</option>
                            <option value="Gato">Gato</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="petSize">Porte *</label>
                        <select id="petSize" required>
                            <option value="PEQUENO">Pequeno</option>
                            <option value="MEDIO">Médio</option>
                            <option value="GRANDE">Grande</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petGender">Sexo *</label>
                        <select id="petGender" required>
                            <option value="Macho">Macho</option>
                            <option value="Fêmea">Fêmea</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="petAge">Idade Estimada *</label>
                        <input type="text" id="petAge" required placeholder="Ex: 2 anos ou 5 meses">
                    </div>
                    <div class="form-group">
                        <label for="petArrivalDate">Data de Chegada ao MiaDota *</label>
                        <input type="date" id="petArrivalDate" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="petOrg">Organização Responsável (ONG) *</label>
                        <select id="petOrg" required>
                            <option value="">Selecione uma organização...</option>
                            <option value="ong1">ONG Amigo de Quatro Patas</option>
                            <option value="ong2">ONG MiaDota Parcerias</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="petStatus">Status Inicial *</label>
                        <select id="petStatus" required>
                            <option value="Disponível">Disponível</option>
                            <option value="Adotado">Adotado</option>
                            <option value="Em Tratamento">Em Tratamento</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="petPhoto">URL da Foto do Pet *</label>
                    <input type="url" id="petPhoto" required placeholder="https://linkdafoto.com/imagem.jpg">
                </div>

                <div class="form-group">
                    <label for="petDesc">Descrição/História *</label>
                    <textarea id="petDesc" required placeholder="Fale sobre as características e o temperamento do animal..."></textarea>
                </div>

                <button type="submit" class="btn-submit-pet">Colocar na Vitrine</button>
            </form>
        </div>

        <!-- Seção de Pets Cadastrados -->
        <h2 class="section-title">Animais já Cadastrados</h2>
        <div id="petsContainer" class="pets-grid">
            <!-- Os cards de pets cadastrados aparecerão dinamicamente aqui -->
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000';

        // Mock inicial para quando a API não estiver conectada
        let petsArr = [
            { id: 1, nome: 'Frederico', especie: 'Cão', porte: 'MEDIO', sexo: 'Macho', idadeEstimada: '2 anos', dataChegada: '2026-05-10', status: 'Disponível', fotoUrl: 'https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=300', descricao: 'Brincalhão e dócil.' },
            { id: 2, nome: 'Mel', especie: 'Gato', porte: 'PEQUENO', sexo: 'Fêmea', idadeEstimada: '1 ano', dataChegada: '2026-06-01', status: 'Disponível', fotoUrl: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=300', descricao: 'Gosta de carinho.' }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            carregarOrganizacoes();
            carregarPets();
        });

        async function carregarOrganizacoes() {
            const selectOrg = document.getElementById('petOrg');
            try {
                const response = await fetch(`${API_URL}/organizacoes`);
                if (response.ok) {
                    const orgs = await response.json();
                    selectOrg.innerHTML = '<option value="">Selecione uma organização...</option>';
                    orgs.forEach(org => {
                        const option = document.createElement('option');
                        option.value = org._id || org.id;
                        option.textContent = org.nome;
                        selectOrg.appendChild(option);
                    });
                }
            } catch (error) {
                console.warn('Usando dados fictícios para ONGs.', error);
                selectOrg.innerHTML = `
                    <option value="">Selecione uma organização...</option>
                    <option value="1">ONG Patinhas Felizes</option>
                    <option value="2">ONG Resgate Animal</option>
                `;
            }
        }

        async function carregarPets() {
            const container = document.getElementById('petsContainer');
            container.innerHTML = '';

            try {
                const response = await fetch(`${API_URL}/animals`);
                if (response.ok) {
                    petsArr = await response.json();
                }
            } catch (error) {
                console.warn('Usando dados simulados para pets.');
            }

            if (petsArr.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted); width: 100%;">Nenhum animal cadastrado ainda.</p>';
                return;
            }

            petsArr.forEach(pet => {
                // Seleção dinâmica de imagens estáticas baseadas no sexo e na espécie direto no front-end
                let imagemExibida = '';
                const especieNormalizada = (pet.especie || '').toLowerCase();
                const sexoNormalizado = (pet.sexo || '').toLowerCase();

                if (especieNormalizada === 'gato') {
                    if (sexoNormalizado === 'fêmea' || sexoNormalizado === 'femea') {
                        imagemExibida = 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=300';
                    } else {
                        imagemExibida = 'https://images.unsplash.com/photo-1573865526739-10659fec78a5?q=80&w=300';
                    }
                } else {
                    if (sexoNormalizado === 'fêmea' || sexoNormalizado === 'femea') {
                        imagemExibida = 'https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=300';
                    } else {
                        imagemExibida = 'https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=300';
                    }
                }

                const card = document.createElement('div');
                card.className = 'pet-card';
                card.innerHTML = `
                    <img class="pet-card-img" src="${imagemExibida}" alt="Foto de ${pet.nome}">
                    <div class="pet-card-body">
                        <div class="pet-card-title">${pet.nome}</div>
                        <div class="pet-card-info"><strong>Espécie:</strong> ${pet.especie}</div>
                        <div class="pet-card-info"><strong>Porte:</strong> ${pet.porte}</div>
                        <div class="pet-card-info"><strong>Sexo:</strong> ${pet.sexo}</div>
                        <div class="pet-card-info"><strong>Idade:</strong> ${pet.idadeEstimada}</div>
                        <div class="pet-card-info"><strong>Status:</strong> ${pet.status}</div>
                        <div class="pet-card-actions">
                            <button class="btn-pet-action btn-pet-delete" onclick="deletarPet(${pet.id || pet._id})">Excluir</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function cadastrarPet(event) {
            event.preventDefault();

            const petData = {
                nome: document.getElementById('petName').value,
                especie: document.getElementById('petSpecies').value,
                porte: document.getElementById('petSize').value,
                sexo: document.getElementById('petGender').value,
                idadeEstimada: document.getElementById('petAge').value,
                dataChegada: document.getElementById('petArrivalDate').value,
                organizacao: document.getElementById('petOrg').value,
                status: document.getElementById('petStatus').value,
                fotoUrl: document.getElementById('petPhoto').value,
                descricao: document.getElementById('petDesc').value
            };

            try {
                const response = await fetch(`${API_URL}/pets`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(petData)
                });

                if (response.ok) {
                    alert('Pet cadastrado com sucesso e inserido na vitrine!');
                    document.getElementById('petForm').reset();
                    carregarPets();
                } else {
                    alert('Erro ao cadastrar pet no servidor.');
                }
            } catch (error) {
                console.error('Erro na requisição:', error);
                
                // Fallback para simulação local
                const novoPet = {
                    id: Date.now(),
                    ...petData
                };
                petsArr.push(novoPet);
                alert('Servidor indisponível. Pet adicionado à lista local de simulação.');
                document.getElementById('petForm').reset();
                carregarPets();
            }
        }

        async function deletarPet(id) {
            if (!confirm('Deseja realmente remover este animal da vitrine?')) return;

            try {
                const response = await fetch(`${API_URL}/pets/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('Pet removido com sucesso!');
                    carregarPets();
                } else {
                    alert('Erro ao excluir o pet do servidor.');
                }
            } catch (error) {
                console.error('Erro na requisição de exclusão:', error);
                
                // Fallback de exclusão local
                petsArr = petsArr.filter(pet => (pet.id || pet._id) !== id);
                alert('Servidor indisponível. Removido da simulação local.');
                carregarPets();
            }
        }
    </script>
</body>
</html>
