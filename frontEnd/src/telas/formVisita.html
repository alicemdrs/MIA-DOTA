<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Visitas - Mia Dota</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav>
        <h1>
            <a href="vitrineScreen.html" class="nav-brand-link">
                <img class="logo-img" src="assets/logo.avif" alt="Logo Patinha">
                Mia Dota
            </a>
        </h1>
        <div class="nav-links">
            <a href="vitrineScreen.html" class="nav-tab-link">Vitrine</a>
        </div>
    </nav>

    <main class="narrow">
        <h2 class="section-title" style="text-align: center; border: none;">Agendar uma Visita</h2>
        <div class="form-card">
            <form id="visitaForm" onsubmit="agendarVisita(event)">
                <div class="form-group">
                    <label for="visitanteNome">Nome Completo *</label>
                    <input type="text" id="visitanteNome" required placeholder="Ex: Maria Souza">
                </div>

                <div class="form-group">
                    <label for="visitanteTelefone">Telefone / WhatsApp *</label>
                    <input type="tel" id="visitanteTelefone" required placeholder="Ex: 11999999999">
                </div>

                <div class="form-group">
                    <label for="visitantePet">ID ou nome do pet *</label>
                    <input type="text" id="visitantePet" required placeholder="Ex: Pipoca ou 1">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="visitaData">Data da Visita *</label>
                        <input type="date" id="visitaData" required>
                    </div>

                    <div class="form-group">
                        <label for="visitaHora">Horário *</label>
                        <input type="time" id="visitaHora" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit" style="width: 100%; margin-top: 0.5rem;">Confirmar Agendamento</button>
            </form>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/form-visita.js"></script>
</body>
</html>
